deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop despacho || true
            docker rm despacho || true
            export AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}"
            if [ -d "$HOME/cdy2204-despacho/.git" ]; then
              cd "$HOME/cdy2204-despacho"
              git pull
            else
              git clone https://github.com/dcruz-00/cdy2204-despacho.git "$HOME/cdy2204-despacho"
              cd "$HOME/cdy2204-despacho"
            fi
            docker compose pull
            docker compose up -d